name: Release on tag

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

env:
  TAG: ${{ github.ref_name }}

jobs:
  release-prerequisites:
    runs-on: ubuntu-latest
    outputs:
      RELEASE_BODY: ${{ steps.release-prerequisites.outputs.RELEASE_BODY }}
    steps:
      - id: release-prerequisites
        uses: thetillhoff/action-release-prerequisites@dcb761b14096c085a2a3794f1b1d69e6e469fed6 # v0.3.2
        with:
          RELEASE_TAG: ${{ env.TAG }}

  build:
    needs: release-prerequisites
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: bun-linux-x64
            artifact: kern_linux_amd64
            binname: kern_bin
            tarball: true
          - target: bun-linux-arm64
            artifact: kern_linux_arm64
            binname: kern_bin
            tarball: true
          - target: bun-darwin-x64
            artifact: kern_darwin_amd64
            binname: kern_bin
            tarball: true
          - target: bun-darwin-arm64
            artifact: kern_darwin_arm64
            binname: kern_bin
            tarball: true
          - target: bun-windows-x64
            artifact: kern_windows_amd64.exe
            binname: kern_bin.exe
            tarball: false
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      - run: bun install --frozen-lockfile
      - name: Build
        run: bun build --compile --minify kern.ts --target ${{ matrix.target }} --outfile ${{ matrix.binname }} --define __VERSION__='"'"$VERSION"'"'
        env:
          VERSION: ${{ env.TAG }}
      - name: Package
        run: |
          if [ "${{ matrix.tarball }}" = "true" ]; then
            mkdir staging
            mv ${{ matrix.binname }} staging/kern
            cp -r node_modules/@earendil-works/pi-coding-agent/dist/modes/interactive/theme staging/theme
            cp -r node_modules/@earendil-works/pi-coding-agent/dist/modes/interactive/assets staging/assets
            cp -r node_modules/@earendil-works/pi-coding-agent/dist/core/export-html staging/export-html
            tar czf ${{ matrix.artifact }}.tar.gz -C staging .
            sha256sum ${{ matrix.artifact }}.tar.gz | awk '{print $1}' > ${{ matrix.artifact }}.tar.gz.sha256
          else
            mv ${{ matrix.binname }} ${{ matrix.artifact }}
            sha256sum ${{ matrix.artifact }} | awk '{print $1}' > ${{ matrix.artifact }}.sha256
          fi
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}*

  release:
    needs:
      - release-prerequisites
      - build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          merge-multiple: true
      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          body: ${{ needs.release-prerequisites.outputs.RELEASE_BODY }}
          prerelease: false
          fail_on_unmatched_files: true
          files: |
            kern_*.tar.gz
            kern_*.tar.gz.sha256
            kern_windows_amd64.exe
            kern_windows_amd64.exe.sha256

  trigger-homebrew-tap:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Trigger homebrew tap update workflow
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_ACCESS_TOKEN }}
        run: |
          gh workflow run update-kern.yml \
            --repo thetillhoff/homebrew-tap
